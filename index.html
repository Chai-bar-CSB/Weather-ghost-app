<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Glass - Professional Weather Utility</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        * { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.2); }
        .glass-dark { background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .gradient-text { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .message-bubble-sent { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .message-bubble-received { background: rgba(255, 255, 255, 0.1); }
        .pin-dot { width: 16px; height: 16px; border-radius: 50%; border: 2px solid rgba(255, 255, 255, 0.5); transition: all 0.2s; }
        .pin-dot.filled { background: white; border-color: white; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .story-ring { background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); padding: 3px; border-radius: 50%; }
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- SUPABASE SETUP ---
        const SUPABASE_URL = 'https://iuzovzgtsggdvvmwcmbi.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_bzi3CBKWzqroNuS28dkatQ_jqXOBcib';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const mockDB = {
            currentUser: JSON.parse(localStorage.getItem('vault_current_user') || 'null'),
            saveUser: async (user) => {
                const { data, error } = await supabaseClient.from('profiles').upsert([
                    { username: user.username.toLowerCase(), pin: user.pin }
                ]);
                if (!error) {
                    mockDB.currentUser = user;
                    localStorage.setItem('vault_current_user', JSON.stringify(user));
                }
            },
            verifyPin: async (username, pin) => {
                const { data } = await supabaseClient
                    .from('profiles')
                    .select('*')
                    .eq('username', username.toLowerCase())
                    .eq('pin', pin)
                    .single();
                if (data) {
                    mockDB.currentUser = data;
                    localStorage.setItem('vault_current_user', JSON.stringify(data));
                    return true;
                }
                return false;
            },
            getFriends: async () => {
                if (!mockDB.currentUser) return [];
                const { data } = await supabaseClient
                    .from('requests')
                    .select('*')
                    .eq('status', 'accepted')
                    .or(`from_user.eq.${mockDB.currentUser.username},to_user.eq.${mockDB.currentUser.username}`);
                return (data || []).map(r => r.from_user === mockDB.currentUser.username ? r.to_user : r.from_user);
            }
        };

        const useWeather = () => {
            const [weather, setWeather] = useState(null);
            const [loading, setLoading] = useState(true);
            const [city, setCity] = useState('London');
            
            const fetchWeather = async (cityName) => {
                setLoading(true);
                // Simulated Data
                const mockData = {
                    name: cityName,
                    main: { temp: 22, humidity: 65, pressure: 1013 },
                    weather: [{ main: 'Clear', description: 'clear sky' }],
                    wind: { speed: 3.5 },
                    forecast: [{ day: 'Mon', temp: 21 }, { day: 'Tue', temp: 23 }, { day: 'Wed', temp: 20 }]
                };
                setTimeout(() => { setWeather(mockData); setLoading(false); }, 500);
            };
            useEffect(() => { fetchWeather(city); }, [city]);
            return { weather, loading, city, setCity, refresh: () => fetchWeather(city) };
        };

        // --- COMPONENTS ---
        const PinEntry = ({ onUnlock, onCancel }) => {
            const [pin, setPin] = useState('');
            const handleNumber = (num) => {
                if (pin.length < 6) {
                    const newPin = pin + num;
                    setPin(newPin);
                    if (newPin.length === 6) onUnlock(); // In production, add verifyPin check here
                }
            };
            return (
                <div className="min-h-screen flex flex-col items-center justify-center p-6 bg-black/80 backdrop-blur-xl text-white">
                    <h2 className="text-2xl mb-8">Enter Security PIN</h2>
                    <div className="flex gap-3 mb-8">
                        {[...Array(6)].map((_, i) => (
                            <div key={i} className={`pin-dot ${i < pin.length ? 'filled' : ''}`}></div>
                        ))}
                    </div>
                    <div className="grid grid-cols-3 gap-4">
                        {[1,2,3,4,5,6,7,8,9].map(n => (
                            <button key={n} onClick={() => handleNumber(n.toString())} className="w-16 h-16 rounded-full glass text-xl">{n}</button>
                        ))}
                        <button onClick={onCancel} className="text-sm">Cancel</button>
                        <button onClick={() => handleNumber('0')} className="w-16 h-16 rounded-full glass text-xl">0</button>
                    </div>
                </div>
            );
        };

        const WeatherDashboard = ({ onEnterVault }) => {
            const { weather, loading } = useWeather();
            return (
                <div className="p-6 text-white">
                    <div className="flex justify-between items-center mb-10">
                        <h1 className="text-xl font-bold">Weather Glass</h1>
                        <button onClick={onEnterVault} className="opacity-0">Vault</button> 
                        <button onClick={onEnterVault} className="w-10 h-10 glass rounded-full flex items-center justify-center">
                            <i className="lucide-menu"></i>
                        </button>
                    </div>
                    {loading ? <p>Loading...</p> : (
                        <div className="glass rounded-3xl p-10 text-center">
                            <h2 className="text-3xl font-light">{weather.name}</h2>
                            <div className="text-8xl my-4">{weather.main.temp}°</div>
                            <p className="capitalize opacity-70">{weather.weather[0].description}</p>
                        </div>
                    )}
                </div>
            );
        };

        const App = () => {
            const [mode, setMode] = useState('weather'); // weather, pin, chat
            
            return (
                <div className="min-h-screen w-full transition-colors duration-500" 
                     style={{ background: mode === 'weather' ? 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)' : '#000' }}>
                    
                    {mode === 'weather' && <WeatherDashboard onEnterVault={() => setMode('pin')} />}
                    {mode === 'pin' && <PinEntry onUnlock={() => setMode('chat')} onCancel={() => setMode('weather')} />}
                    {mode === 'chat' && (
                        <div className="p-6 text-white">
                            <h2 className="text-2xl font-bold gradient-text">Secure Vault</h2>
                            <p className="mt-4 text-gray-400">Your private messages are now visible.</p>
                            <button onClick={() => setMode('weather')} className="mt-10 px-4 py-2 bg-red-500/20 text-red-400 rounded-lg">Exit Vault</button>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

<body>
    <div id="root"></div>
    <script type="text/babel">

        * {
            font-family: 'Inter', sans-serif;
        }
        
        .glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .glass-dark {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .gradient-text {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .weather-gradient {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .chat-gradient {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }
        
        .message-bubble-sent {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .message-bubble-received {
            background: rgba(255, 255, 255, 0.1);
        }
        
        .shake {
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
        }
        
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }
        
        .fade-in {
            animation: fadeIn 0.3s ease-in;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .slide-up {
            animation: slideUp 0.3s ease-out;
        }
        
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        
        .pin-dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.5);
            transition: all 0.2s;
        }
        
        .pin-dot.filled {
            background: white;
            border-color: white;
        }
        
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        
        .story-ring {
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            padding: 3px;
            border-radius: 50%;
        }
              // --- STEP 2: SUPABASE LIVE CONNECTION ---
        const SUPABASE_URL = 'https://iuzovzgtsggdvvmwcmbi.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_bzi3CBKWzqroNuS28dkatQ_jqXOBcib';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // This replaces the old mockDB with real database calls
        const mockDB = {
            currentUser: JSON.parse(localStorage.getItem('vault_current_user') || 'null'),
            
            saveUser: async (user) => {
                const { data, error } = await supabaseClient.from('profiles').upsert([
                    { username: user.username.toLowerCase(), pin: user.pin }
                ]);
                if (!error) {
                    mockDB.currentUser = user;
                    localStorage.setItem('vault_current_user', JSON.stringify(user));
                }
            },
            
            verifyPin: async (username, pin) => {
                const { data } = await supabaseClient
                    .from('profiles')
                    .select('*')
                    .eq('username', username.toLowerCase())
                    .eq('pin', pin)
                    .single();
                if (data) {
                    mockDB.currentUser = data;
                    localStorage.setItem('vault_current_user', JSON.stringify(data));
                    return true;
                }
                return false;
            },
            
            sendMessage: async (to, content) => {
                const { data } = await supabaseClient.from('messages').insert([{
                    from_user: mockDB.currentUser.username,
                    to_user: to,
                    content: content,
                    timestamp: new Date().toISOString()
                }]);
                return data;
            },
            
            getMessages: async (withUser) => {
                const { data } = await supabaseClient
                    .from('messages')
                    .select('*')
                    .or(`from_user.eq.${mockDB.currentUser.username},to_user.eq.${mockDB.currentUser.username}`)
                    .order('timestamp', { ascending: true });
                
                return (data || []).filter(m => 
                    (m.from_user === withUser || m.to_user === withUser)
                );
            },
            
            getFriends: async () => {
                const { data } = await supabaseClient
                    .from('requests')
                    .select('*')
                    .eq('status', 'accepted')
                    .or(`from_user.eq.${mockDB.currentUser.username},to_user.eq.${mockDB.currentUser.username}`);
                
                return (data || []).map(r => 
                    r.from_user === mockDB.currentUser.username ? r.to_user : r.from_user
                );
            },
            
            getPendingRequests: async () => {
                const { data } = await supabaseClient
                    .from('requests')
                    .select('*')
                    .eq('to_user', mockDB.currentUser.username)
                    .eq('status', 'pending');
                return data || [];
        }
    }; // This single brace closes the mockDB object correctly.

    // Weather API Hook
    const useWeather = () => {

        // Weather API Hook
        const useWeather = () => {
            const [weather, setWeather] = useState(null);
            const [loading, setLoading] = useState(true);
            const [city, setCity] = useState('London');
            
            const fetchWeather = async (cityName) => {
                setLoading(true);
                try {
                    // Using OpenWeatherMap API (free tier)
                    const API_KEY = 'YOUR_API_KEY'; // Replace with your OpenWeather API key
                    // For demo, using mock data structure that matches real API
                    
                    // Simulated API call - replace with actual fetch
                    const mockData = {
                        name: cityName,
                        main: {
                            temp: 22,
                            humidity: 65,
                            pressure: 1013
                        },
                        weather: [{ main: 'Clear', description: 'clear sky', icon: '01d' }],
                        wind: { speed: 3.5 },
                        forecast: [
                            { day: 'Mon', temp: 21, icon: '02d' },
                            { day: 'Tue', temp: 23, icon: '01d' },
                            { day: 'Wed', temp: 20, icon: '03d' },
                            { day: 'Thu', temp: 19, icon: '09d' },
                            { day: 'Fri', temp: 22, icon: '01d' },
                            { day: 'Sat', temp: 24, icon: '02d' },
                            { day: 'Sun', temp: 25, icon: '01d' }
                        ]
                    };
                    
                    // Actual API call (uncomment when you have API key):
                    /*
                    const response = await fetch(
                        `https://api.openweathermap.org/data/2.5/weather?q=${cityName}&appid=${API_KEY}&units=metric`
                    );
                    const data = await response.json();
                    */
                    
                    setTimeout(() => {
                        setWeather(mockData);
                        setLoading(false);

                } catch (error) {
                    console.error('Weather fetch error:', error);
                    setLoading(false);
                }
            };
            
            useEffect(() => {
                fetchWeather(city);
            }, [city]);
            
            return { weather, loading, city, setCity, refresh: () => fetchWeather(city) };
        };

        // Main App Component
        const App = () => {
            const [mode, setMode] = useState('weather'); // 'weather', 'pin', 'chat'
            const [chatView, setChatView] = useState('feed'); // 'feed', 'search', 'messages', 'chat'
            const [selectedChat, setSelectedChat] = useState(null);
            const [unit, setUnit] = useState('C');
            const [showMenu, setShowMenu] = useState(false);
            const [notification, setNotification] = useState(null);
            
            // Panic gesture detection
            const lastTap = useRef(0);
            const touchStartY = useRef(0);
            
            const handleDoubleTap = (e) => {
                const currentTime = new Date().getTime();
                const tapLength = currentTime - lastTap.current;
                if (tapLength < 300 && tapLength > 0) {
                    // Double tap detected - PANIC MODE
                    if (mode === 'chat') {
                        setMode('weather');
                        setChatView('feed');
                        setSelectedChat(null);
                        setNotification({
                            title: 'Weather Alert',
                            message: 'Pressure change detected in your area'
                        });
                        setTimeout(() => setNotification(null), 3000);
                    }
                }
                lastTap.current = currentTime;
            };
            
            // Shake detection for mobile
            useEffect(() => {
                let lastX = 0, lastY = 0, lastZ = 0;
                let moveCounter = 0;
                
                const handleMotion = (e) => {
                    const { accelerationIncludingGravity } = e;
                    if (!accelerationIncludingGravity) return;
                    
                    const { x, y, z } = accelerationIncludingGravity;
                    const deltaX = Math.abs(x - lastX);
                    const deltaY = Math.abs(y - lastY);
                    const deltaZ = Math.abs(z - lastZ);
                    
                    if (deltaX + deltaY + deltaZ > 30) {
                        moveCounter++;
                        if (moveCounter > 2 && mode === 'chat') {
                            setMode('weather');
                            setChatView('feed');
                            setSelectedChat(null);
                            setNotification({
                                title: 'Weather Alert',
                                message: 'Pressure change detected in your area'
                            });
                            setTimeout(() => setNotification(null), 3000);
                            moveCounter = 0;
                        }
                    }
                    
                    lastX = x;
                    lastY = y;
                    lastZ = z;
                };
                
                if (window.DeviceMotionEvent) {
                    window.addEventListener('devicemotion', handleMotion);
                    return () => window.removeEventListener('devicemotion', handleMotion);
                }
            }, [mode]);
            
            const enterVault = () => {
                setShowMenu(false);
                setMode('pin');
            };
            
            const unlockChat = () => {
                setMode('chat');
            };
            
            const exitToWeather = () => {
                setMode('weather');
                setChatView('feed');
                setSelectedChat(null);
            };
            
            return (
                <div 
                    className="min-h-screen w-full relative overflow-hidden"
                    onClick={handleDoubleTap}
                    style={{
                        background: mode === 'weather' 
                            ? 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)'
                            : 'linear-gradient(135deg, #1a1a2e 0%, #16213e 100%)'
                    }}
                >
                    {/* Background Animation */}
                    <div className="absolute inset-0 overflow-hidden pointer-events-none">
                        <div className="absolute -top-40 -left-40 w-80 h-80 bg-white opacity-10 rounded-full blur-3xl animate-pulse"></div>
                        <div className="absolute top-1/2 -right-40 w-96 h-96 bg-purple-400 opacity-10 rounded-full blur-3xl animate-pulse delay-1000"></div>
                    </div>
                    
                    {/* Notification Toast */}
                    {notification && (
                        <div className="fixed top-4 left-4 right-4 z-50 glass-dark rounded-2xl p-4 fade-in">
                            <div className="flex items-center gap-3">
                                <div className="w-10 h-10 rounded-full bg-yellow-500 flex items-center justify-center">
                                    <svg className="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                                    </svg>
                                </div>
                                <div>
                                    <h4 className="font-semibold text-sm">{notification.title}</h4>
                                    <p className="text-xs text-gray-300">{notification.message}</p>
                                </div>
                            </div>
                        </div>
                    )}
                    
                    {/* Weather Mode */}
                    {mode === 'weather' && (
                        <WeatherDashboard 
                            onMenuToggle={() => setShowMenu(!showMenu)}
                            showMenu={showMenu}
                            onEnterVault={enterVault}
                            unit={unit}
                            setUnit={setUnit}
                        />
                    )}
                    
                    {/* PIN Entry Mode */}
                    {mode === 'pin' && (
                        <PinEntry 
                            onUnlock={unlockChat}
                            onCancel={() => setMode('weather')}
                        />
                    )}
                    
                    {/* Chat Mode */}
                    {mode === 'chat' && (
                        <ChatInterface 
                            view={chatView}
                            setView={setChatView}
                            selectedChat={selectedChat}
                            setSelectedChat={setSelectedChat}
                            onExit={exitToWeather}
                        />
                    )}
                    
                    {/* Double-tap hint for chat mode */}
                    {mode === 'chat' && (
                        <div className="fixed bottom-20 left-1/2 transform -translate-x-1/2 z-40">
                            <p className="text-xs text-gray-500 glass-dark px-3 py-1 rounded-full">
                                Double-tap anywhere to exit
                            </p>
                        </div>
                    )}
                </div>
            );
        };

        // Weather Dashboard Component
        const WeatherDashboard = ({ onMenuToggle, showMenu, onEnterVault, unit, setUnit }) => {
            const { weather, loading, city, setCity, refresh } = useWeather();
            const [searchCity, setSearchCity] = useState('');
            
            const handleSearch = (e) => {
                e.preventDefault();
                if (searchCity.trim()) {
                    setCity(searchCity);
                    setSearchCity('');
                }
            };
            
            const convertTemp = (temp) => {
                if (unit === 'F') return Math.round((temp * 9/5) + 32);
                return Math.round(temp);
            };
            
            return (
                <div className="relative z-10 p-6 min-h-screen flex flex-col">
                    {/* Header */}
                    <div className="flex justify-between items-center mb-8">
                        <div className="flex items-center gap-2">
                            <div className="w-10 h-10 rounded-full glass flex items-center justify-center">
                                <svg className="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 15a4 4 0 004 4h9a5 5 0 10-.1-9.999 5.002 5.002 0 10-9.78 2.096A4.001 4.001 0 003 15z" />
                                </svg>
                            </div>
                            <span className="font-semibold text-lg">Weather Glass</span>
                        </div>
                        
                        <button 
                            onClick={onMenuToggle}
                            className="w-10 h-10 rounded-full glass flex items-center justify-center hover:bg-white/20 transition"
                        >
                            <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 6h16M4 12h16M4 18h16" />
                            </svg>
                        </button>
                    </div>
                    
                    {/* Menu Dropdown */}
                    {showMenu && (
                        <div className="absolute top-20 right-6 w-48 glass-dark rounded-2xl overflow-hidden z-50 slide-up">
                            <button 
                                onClick={() => setUnit(unit === 'C' ? 'F' : 'C')}
                                className="w-full px-4 py-3 text-left hover:bg-white/10 flex items-center gap-3"
                            >
                                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19.428 15.428a2 2 0 00-1.022-.547l-2.384-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z" />
                                </svg>
                                <span>Unit: °{unit}</span>
                            </button>
                            <button 
                                onClick={refresh}
                                className="w-full px-4 py-3 text-left hover:bg-white/10 flex items-center gap-3"
                            >
                                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                                </svg>
                                <span>Refresh</span>
                            </button>
                            <div className="border-t border-white/10"></div>
                            <button 
                                onClick={onEnterVault}
                                className="w-full px-4 py-3 text-left hover:bg-white/10 flex items-center gap-3 text-blue-300"
                            >
                                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" />
                                </svg>
                                <span>Chat Now</span>
                            </button>
                        </div>
                    )}
                    
                    {/* Search Bar */}
                    <form onSubmit={handleSearch} className="mb-6">
                        <div className="glass rounded-2xl flex items-center px-4 py-3">
                            <svg className="w-5 h-5 text-white/60 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                            </svg>
                            <input 
                                type="text"
                                value={searchCity}
                                onChange={(e) => setSearchCity(e.target.value)}
                                placeholder="Search city..."
                                className="bg-transparent border-none outline-none text-white placeholder-white/60 w-full"
                            />
                        </div>
                    </form>
                    
                    {/* Main Weather Display */}
                    {loading ? (
                        <div className="flex-1 flex items-center justify-center">
                            <div className="w-8 h-8 border-4 border-white/30 border-t-white rounded-full animate-spin"></div>
                        </div>
                    ) : weather && (
                        <div className="flex-1 flex flex-col">
                            {/* Current Weather */}
                            <div className="glass rounded-3xl p-8 mb-6 text-center">
                                <h2 className="text-2xl font-light mb-2">{weather.name}</h2>
                                <div className="text-7xl font-light mb-4">
                                    {convertTemp(weather.main.temp)}°
                                </div>
                                <p className="text-lg capitalize mb-6">{weather.weather[0].description}</p>
                                
                                <div className="grid grid-cols-3 gap-4">
                                    <div className="glass rounded-2xl p-3">
                                        <svg className="w-6 h-6 mx-auto mb-1 opacity-60" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19.428 15.428a2 2 0 00-1.022-.547l-2.384-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z" />
                                        </svg>
                                        <p className="text-xs opacity-60">Humidity</p>
                                        <p className="font-semibold">{weather.main.humidity}%</p>
                                    </div>
                                    <div className="glass rounded-2xl p-3">
                                        <svg className="w-6 h-6 mx-auto mb-1 opacity-60" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M14.828 14.828a4 4 0 01-5.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                                        </svg>
                                        <p className="text-xs opacity-60">Wind</p>
                                        <p className="font-semibold">{weather.wind.speed} m/s</p>
                                    </div>
                                    <div className="glass rounded-2xl p-3">
                                        <svg className="w-6 h-6 mx-auto mb-1 opacity-60" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 10V3L4 14h7v7l9-11h-7z" />
                                        </svg>
                                        <p className="text-xs opacity-60">Pressure</p>
                                        <p className="font-semibold">{weather.main.pressure} hPa</p>
                                    </div>
                                </div>
                            </div>
                            
                            {/* 7-Day Forecast */}
                            <div className="glass rounded-3xl p-6">
                                <h3 className="text-sm font-semibold mb-4 opacity-80 uppercase tracking-wider">7-Day Forecast</h3>
                                <div className="space-y-3">
                                    {weather.forecast.map((day, idx) => (
                                        <div key={idx} className="flex items-center justify-between">
                                            <span className="w-12 font-medium">{day.day}</span>
                                            <div className="flex-1 flex items-center justify-center">
                                                <svg className="w-8 h-8 opacity-80" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
                                                </svg>
                                            </div>
                                            <span className="font-semibold">{convertTemp(day.temp)}°</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // PIN Entry Component
        const PinEntry = ({ onUnlock, onCancel }) => {
            const [pin, setPin] = useState('');
            const [isFirstRun, setIsFirstRun] = useState(!mockDB.currentUser);
            const [username, setUsername] = useState('');
            const [error, setError] = useState('');
            const [step, setStep] = useState(1); // 1: PIN, 2: Confirm PIN (first run)
            const [tempPin, setTempPin] = useState('');
            
            const handleNumber = (num) => {
                if (pin.length < 6) {
                    const newPin = pin + num;
                    setPin(newPin);
                    setError('');
                    
                    if (newPin.length === 6) {
                        setTimeout(() => handleComplete(newPin), 200);
                    }
                }
            };
            
            const handleComplete = (completedPin) => {
                if (isFirstRun) {
                    if (step === 1) {
                        setTempPin(completedPin);
                        setPin('');
                        setStep(2);
                    } else {
                        if (completedPin === tempPin) {
                            // Save new user
                            if (username.length < 3) {
                                setError('Username must be at least 3 characters');
                                setPin('');
                                return;
                            }
                            mockDB.saveUser({ username: username.toLowerCase(), pin: completedPin });
                            onUnlock();
                        } else {
                            setError('PINs do not match');
                            setPin('');
                            setStep(1);
                        }
                    }
                } else {
                    // Verify existing PIN
                    if (mockDB.verifyPin(mockDB.currentUser.username, completedPin)) {
                        onUnlock();
                    } else {
                        setError('Invalid PIN');
                        setPin('');
                    }
                }
            };
            
            const handleDelete = () => {
                setPin(pin.slice(0, -1));
                setError('');
            };
            
            return (
                <div className="min-h-screen flex flex-col items-center justify-center p-6 bg-black/50 backdrop-blur-xl">
                    <div className="w-full max-w-sm">
                        <div className="text-center mb-8">
                            <div className="w-16 h-16 rounded-full glass flex items-center justify-center mx-auto mb-4">
                                <svg className="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                                </svg>
                            </div>
                            <h2 className="text-2xl font-semibold mb-2">
                                {isFirstRun 
                                    ? (step === 1 ? 'Create PIN' : 'Confirm PIN') 
                                    : 'Enter PIN'}
                            </h2>
                            <p className="text-sm text-gray-400">
                                {isFirstRun 
                                    ? (step === 1 ? 'Set your 6-digit security code' : 'Re-enter to confirm')
                                    : `Welcome back, @${mockDB.currentUser?.username}`}
                            </p>
                        </div>
                        
                        {/* Username Input (First Run Step 1) */}
                        {isFirstRun && step === 1 && (
                            <div className="mb-6">
                                <input 
                                    type="text"
                                    value={username}
                                    onChange={(e) => setUsername(e.target.value)}
                                    placeholder="Choose @username"
                                    className="w-full glass-dark rounded-2xl px-4 py-3 text-center text-lg outline-none focus:ring-2 focus:ring-blue-500"
                                    maxLength={20}
                                />
                            </div>
                        )}
                        
                        {/* PIN Dots */}
                        <div className="flex justify-center gap-3 mb-8">
                            {[0,1,2,3,4,5].map((i) => (
                                <div key={i} className={`pin-dot ${i < pin.length ? 'filled' : ''}`}></div>
                            ))}
                        </div>
                        
                        {error && (
                            <p className="text-red-400 text-center mb-4 text-sm">{error}</p>
                        )}
                        
                        {/* Keypad */}
                        <div className="grid grid-cols-3 gap-4 mb-6">
                            {[1,2,3,4,5,6,7,8,9].map((num) => (
                                <button
                                    key={num}
                                    onClick={() => handleNumber(num.toString())}
                                    className="aspect-square rounded-full glass flex items-center justify-center text-2xl font-light hover:bg-white/20 active:scale-95 transition"
                                >
                                    {num}
                                </button>
                            ))}
                            <button
                                onClick={onCancel}
                                className="aspect-square rounded-full glass flex items-center justify-center text-sm hover:bg-white/20 active:scale-95 transition"
                            >
                                Cancel
                            </button>
                            <button
                                onClick={() => handleNumber('0')}
                                className="aspect-square rounded-full glass flex items-center justify-center text-2xl font-light hover:bg-white/20 active:scale-95 transition"
                            >
                                0
                            </button>
                            <button
                                onClick={handleDelete}
                                className="aspect-square rounded-full glass flex items-center justify-center hover:bg-white/20 active:scale-95 transition"
                            >
                                <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2M3 12l6.414 6.414a2 2 0 001.414.586H19a2 2 0 002-2V7a2 2 0 00-2-2h-8.172a2 2 0 00-1.414.586L3 12z" />
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        // Chat Interface Component
        const ChatInterface = ({ view, setView, selectedChat, setSelectedChat, onExit }) => {
            const [stories] = useState([
                { id: 1, user: 'alice', viewed: false },
                { id: 2, user: 'bob', viewed: true },
                { id: 3, user: 'charlie', viewed: false },
            ]);
            
            const renderContent = () => {
                switch(view) {
                    case 'feed':
                        return <FeedView stories={stories} setView={setView} setSelectedChat={setSelectedChat} />;
                    case 'search':
                        return <SearchView setView={setView} setSelectedChat={setSelectedChat} />;
                    case 'messages':
                        return <MessagesView setView={setView} setSelectedChat={setSelectedChat} />;
                    case 'chat':
                        return <ChatRoomView selectedChat={selectedChat} setView={setView} />;
                    default:
                        return <FeedView stories={stories} />;
                }
            };
            
            return (
                <div className="min-h-screen flex flex-col bg-gradient-to-b from-gray-900 to-black">
                    {/* Header */}
                    <div className="glass-dark px-4 py-3 flex items-center justify-between sticky top-0 z-40">
                        <h1 className="font-bold text-xl gradient-text">Vault</h1>
                        <div className="flex items-center gap-3">
                            <span className="text-sm text-gray-400">@{mockDB.currentUser?.username}</span>
                            <button 
                                onClick={onExit}
                                className="w-8 h-8 rounded-full bg-red-500/20 flex items-center justify-center hover:bg-red-500/40 transition"
                            >
                                <svg className="w-4 h-4 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" />
                                </svg>
                            </button>
                        </div>
                    </div>
                    
                    {/* Content */}
                    <div className="flex-1 overflow-y-auto hide-scrollbar">
                        {renderContent()}
                    </div>
                    
                    {/* Bottom Navigation */}
                    <div className="glass-dark px-6 py-4 flex justify-around items-center sticky bottom-0 z-40">
                        <button 
                            onClick={() => setView('feed')}
                            className={`flex flex-col items-center gap-1 ${view === 'feed' ? 'text-white' : 'text-gray-500'}`}
                        >
                            <svg className="w-6 h-6" fill={view === 'feed' ? 'currentColor' : 'none'} stroke="currentColor" viewBox="0 0 24 24">
                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                            </svg>
                            <span className="text-xs">Home</span>
                        </button>
                        
                        <button 
                            onClick={() => setView('search')}
                            className={`flex flex-col items-center gap-1 ${view === 'search' ? 'text-white' : 'text-gray-500'}`}
                        >
                            <svg className="w-6 h-6" fill={view === 'search' ? 'currentColor' : 'none'} stroke="currentColor" viewBox="0 0 24 24">
                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                            </svg>
                            <span className="text-xs">Search</span>
                        </button>
                        
                        <button 
                            onClick={() => setView('messages')}
                            className={`flex flex-col items-center gap-1 ${view === 'messages' || view === 'chat' ? 'text-white' : 'text-gray-500'}`}
                        >
                            <div className="relative">
                                <svg className="w-6 h-6" fill={view === 'messages' || view === 'chat' ? 'currentColor' : 'none'} stroke="currentColor" viewBox="0 0 24 24">
                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" />
                                </svg>
                                {mockDB.getPendingRequests().length > 0 && (
                                    <span className="absolute -top-1 -right-1 w-4 h-4 bg-red-500 rounded-full text-xs flex items-center justify-center">
                                        {mockDB.getPendingRequests().length}
                                    </span>
                                )}
                            </div>
                            <span className="text-xs">Messages</span>
                        </button>
                    </div>
                </div>
            );
        };

        // Feed View (Stories)
        const FeedView = ({ stories, setView, setSelectedChat }) => {
            const friends = mockDB.getFriends();
            
            return (
                <div className="p-4">
                    {/* Stories Row */}
                    <div className="flex gap-4 overflow-x-auto hide-scrollbar mb-6 pb-2">
                        <div className="flex flex-col items-center gap-1 min-w-[72px]">
                            <div className="w-16 h-16 rounded-full glass flex items-center justify-center border-2 border-dashed border-gray-500">
                                <svg className="w-6 h-6 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4" />
                                </svg>
                            </div>
                            <span className="text-xs text-gray-400">Add Story</span>
                        </div>
                        
                        {friends.map((friend, idx) => (
                            <div 
                                key={idx} 
                                className="flex flex-col items-center gap-1 min-w-[72px] cursor-pointer"
                                onClick={() => {
                                    setSelectedChat(friend);
                                    setView('chat');
                                }}
                            >
                                <div className={idx % 2 === 0 ? 'story-ring' : 'story-ring-viewed'}>
                                    <div className="w-16 h-16 rounded-full bg-gray-800 flex items-center justify-center overflow-hidden">
                                        <span className="text-lg font-bold">{(friend[0] || '?').toUpperCase()}</span>
                                    </div>
                                </div>
                                <span className="text-xs text-gray-300 truncate w-16 text-center">{friend}</span>
                            </div>
                        ))}
                    </div>
                    
                    {/* Empty State */}
                    {friends.length === 0 && (
                        <div className="text-center py-20">
                            <div className="w-20 h-20 rounded-full glass flex items-center justify-center mx-auto mb-4">
                                <svg className="w-10 h-10 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0z" />
                                </svg>
                            </div>
                            <p className="text-gray-400 mb-2">No connections yet</p>
                            <button 
                                onClick={() => setView('search')}
                                className="text-blue-400 text-sm hover:underline"
                            >
                                Find people by username
                            </button>
                        </div>
                    )}
                </div>
            );
        };

        // Search/Discovery View
        const SearchView = ({ setView, setSelectedChat }) => {
            const [search, setSearch] = useState('');
            const [result, setResult] = useState(null);
            const [requestSent, setRequestSent] = useState(false);
            
            const handleSearch = () => {
                if (search.trim() && search !== mockDB.currentUser.username) {
                    const user = mockDB.users.find(u => u.username === search.toLowerCase());
                    if (user) {
                        setResult(user);
                        // Check if already friends or pending
                        const existing = mockDB.requests.find(r => 
                            (r.from === mockDB.currentUser.username && r.to === user.username) ||
                            (r.to === mockDB.currentUser.username && r.from === user.username)
                        );
                        setRequestSent(!!existing);
                    } else {
                        setResult(null);
                    }
                }
            };
            
            const sendRequest = () => {
                if (mockDB.sendRequest(result.username)) {
                    setRequestSent(true);
                }
            };
            
            return (
                <div className="p-4">
                    <div className="glass-dark rounded-2xl flex items-center px-4 py-3 mb-6">
                        <svg className="w-5 h-5 text-gray-400 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                        </svg>
                        <input 
                            type="text"
                            value={search}
                            onChange={(e) => setSearch(e.target.value)}
                            onKeyPress={(e) => e.key === 'Enter' && handleSearch()}
                            placeholder="Search by exact @username..."
                            className="bg-transparent border-none outline-none text-white w-full placeholder-gray-500"
                        />
                        <button 
                            onClick={handleSearch}
                            className="ml-2 text-blue-400 text-sm font-medium"
                        >
                            Search
                        </button>
                    </div>
                    
                    {result ? (
                        <div className="glass-dark rounded-2xl p-6 text-center">
                            <div className="w-20 h-20 rounded-full bg-gradient-to-br from-blue-400 to-purple-600 flex items-center justify-center mx-auto mb-4 text-2xl font-bold">
                                {result.username[0].toUpperCase()}
                            </div>
                            <h3 className="text-lg font-semibold mb-1">@{result.username}</h3>
                            <p className="text-sm text-gray-400 mb-4">User found</p>
                            
                            {requestSent ? (
                                <button className="w-full py-3 rounded-xl bg-gray-700 text-gray-400 cursor-not-allowed">
                                    Request Sent or Connected
                                </button>
                            ) : (
                                <button 
                                    onClick={sendRequest}
                                    className="w-full py-3 rounded-xl bg-blue-600 hover:bg-blue-700 transition font-medium"
                                >
                                    Send Connection Request
                                </button>
                            )}
                        </div>
                    ) : search && (
                        <div className="text-center py-10 text-gray-500">
                            <p>No user found with that username</p>
                            <p className="text-sm mt-2">Usernames are case-sensitive and exact match only</p>
                        </div>
                    )}
                    
                    <div className="mt-8 p-4 glass-dark rounded-2xl">
                        <h4 className="text-sm font-semibold mb-2 text-gray-400">Privacy Note</h4>
                        <p className="text-xs text-gray-500 leading-relaxed">
                            Users can only be found by their exact username. There are no suggested users or public directories. Your privacy is protected through obscurity.
                        </p>
                    </div>
                </div>
            );
        };

        // Messages List View
        const MessagesView = ({ setView, setSelectedChat }) => {
            const friends = mockDB.getFriends();
            const requests = mockDB.getPendingRequests();
            const [activeTab, setActiveTab] = useState('chats');
            
            const getLastMessage = (friend) => {
                const messages = mockDB.getMessages(friend);
                return messages[messages.length - 1];
            };
            
            return (
                <div className="h-full">
                    {/* Tabs */}
                    <div className="flex border-b border-gray-800">
                        <button 
                            onClick={() => setActiveTab('chats')}
                            className={`flex-1 py-3 text-sm font-medium ${activeTab === 'chats' ? 'text-white border-b-2 border-blue-500' : 'text-gray-500'}`}
                        >
                            Chats
                        </button>
                        <button 
                            onClick={() => setActiveTab('requests')}
                            className={`flex-1 py-3 text-sm font-medium relative ${activeTab === 'requests' ? 'text-white border-b-2 border-blue-500' : 'text-gray-500'}`}
                        >
                            Requests
                            {requests.length > 0 && (
                                <span className="ml-2 px-2 py-0.5 bg-red-500 rounded-full text-xs">
                                    {requests.length}
                                </span>
                            )}
                        </button>
                    </div>
                    
                    {activeTab === 'chats' ? (
                        <div className="divide-y divide-gray-800">
                            {friends.length === 0 ? (
                                <div className="p-8 text-center text-gray-500">
                                    <p>No active conversations</p>
                                    <button 
                                        onClick={() => setView('search')}
                                        className="mt-2 text-blue-400 text-sm"
                                    >
                                        Start a new chat
                                    </button>
                                </div>
                            ) : (
                                friends.map(friend => {
                                    const lastMsg = getLastMessage(friend);
                                    return (
                                        <div 
                                            key={friend}
                                            onClick={() => {
                                                setSelectedChat(friend);
                                                setView('chat');
                                            }}
                                            className="p-4 flex items-center gap-3 hover:bg-white/5 cursor-pointer active:bg-white/10"
                                        >
                                            <div className="w-12 h-12 rounded-full bg-gradient-to-br from-gray-700 to-gray-900 flex items-center justify-center font-bold">
                                                {friend[0].toUpperCase()}
                                            </div>
                                            <div className="flex-1 min-w-0">
                                                <h4 className="font-medium truncate">@{friend}</h4>
                                                <p className="text-sm text-gray-400 truncate">
                                                    {lastMsg ? (
                                                        lastMsg.unsent ? (
                                                            <span className="italic text-gray-600">Message unsent</span>
                                                        ) : (
                                                            <>
                                                                {lastMsg.from === mockDB.currentUser.username ? 'You: ' : ''}
                                                                {lastMsg.content}
                                                            </>
                                                        )
                                                    ) : 'No messages yet'}
                                                </p>
                                            </div>
                                            {lastMsg && !lastMsg.seen && lastMsg.from !== mockDB.currentUser.username && (
                                                <div className="w-2 h-2 rounded-full bg-blue-500"></div>
                                            )}
                                        </div>
                                    );
                                })
                            )}
                        </div>
                    ) : (
                        <div className="divide-y divide-gray-800">
                            {requests.length === 0 ? (
                                <div className="p-8 text-center text-gray-500">
                                    <p>No pending requests</p>
                                </div>
                            ) : (
                                requests.map(req => (
                                    <div key={req.id} className="p-4 flex items-center justify-between">
                                        <div className="flex items-center gap-3">
                                            <div className="w-12 h-12 rounded-full bg-gradient-to-br from-blue-600 to-purple-600 flex items-center justify-center font-bold">
                                                {req.from[0].toUpperCase()}
                                            </div>
                                            <div>
                                                <h4 className="font-medium">@{req.from}</h4>
                                                <p className="text-xs text-gray-400">Wants to connect</p>
                                            </div>
                                        </div>
                                        <div className="flex gap-2">
                                            <button 
                                                onClick={() => {
                                                    mockDB.acceptRequest(req.id);
                                                    // Force re-render
                                                    window.location.reload();
                                                }}
                                                className="px-4 py-2 bg-blue-600 rounded-lg text-sm font-medium hover:bg-blue-700"
                                            >
                                                Accept
                                            </button>
                                            <button className="px-4 py-2 bg-gray-700 rounded-lg text-sm hover:bg-gray-600">
                                                Decline
                                            </button>
                                        </div>
                                    </div>
                                ))
                            )}
                        </div>
                    )}
                </div>
            );
        };

        // Individual Chat Room
        const ChatRoomView = ({ selectedChat, setView }) => {
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState('');
            const [showUnsend, setShowUnsend] = useState(null);
            const messagesEndRef = useRef(null);
            
            useEffect(() => {
                const msgs = mockDB.getMessages(selectedChat);
                setMessages(msgs);
                // Mark as seen
                msgs.forEach(m => {
                    if (m.to === mockDB.currentUser.username && !m.seen) {
                        m.seen = true;
                    }
                });
                localStorage.setItem('vault_messages', JSON.stringify(mockDB.messages));
            }, [selectedChat]);
            
            const scrollToBottom = () => {
                messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
            };
            
            useEffect(scrollToBottom, [messages]);
            
            const sendMessage = () => {
                if (!input.trim()) return;
                const msg = mockDB.sendMessage(selectedChat, input);
                setMessages([...messages, msg]);
                setInput('');
            };
            
            const handleUnsend = (msgId) => {
                mockDB.unsendMessage(msgId);
                setMessages(mockDB.getMessages(selectedChat));
                setShowUnsend(null);
            };
            
            return (
                <div className="h-full flex flex-col bg-black">
                    {/* Chat Header */}
                    <div className="glass-dark px-4 py-3 flex items-center gap-3 sticky top-0 z-40">
                        <button 
                            onClick={() => setView('messages')}
                            className="p-2 -ml-2 hover:bg-white/10 rounded-full"
                        >
                            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 19l-7-7 7-7" />
                            </svg>
                        </button>
                        <div className="w-8 h-8 rounded-full bg-gradient-to-br from-blue-400 to-purple-600 flex items-center justify-center text-sm font-bold">
                            {selectedChat[0].toUpperCase()}
                        </div>
                        <span className="font-semibold">@{selectedChat}</span>
                    </div>
                    
                    {/* Messages */}
                    <div className="flex-1 overflow-y-auto p-4 space-y-4">
                        {messages.map((msg, idx) => (
                            <div 
                                key={msg.id}
                                className={`flex ${msg.from === mockDB.currentUser.username ? 'justify-end' : 'justify-start'}`}
                            >
                                <div className={`max-w-[70%] relative group`}>
                                    <div 
                                        className={`rounded-2xl px-4 py-2 ${
                                            msg.from === mockDB.currentUser.username 
                                                ? 'message-bubble-sent text-white' 
                                                : 'message-bubble-received text-white'
                                        } ${msg.unsent ? 'opacity-50' : ''}`}
                                        onClick={() => {
                                            if (msg.from === mockDB.currentUser.username && !msg.unsent) {
                                                setShowUnsend(showUnsend === msg.id ? null : msg.id);
                                            }
                                        }}
                                    >
                                        {msg.unsent ? (
                                            <span className="italic text-sm">You unsent a message</span>
                                        ) : (
                                            <p>{msg.content}</p>
                                        )}
                                    </div>
                                    
                                    {/* Unsend Option */}
                                    {showUnsend === msg.id && (
                                        <div className="absolute -top-8 right-0 bg-gray-800 rounded-lg shadow-lg p-2 z-10 slide-up">
                                            <button 
                                                onClick={() => handleUnsend(msg.id)}
                                                className="text-xs text-red-400 whitespace-nowrap hover:text-red-300"
                                            >
                                                Unsend for everyone
                                            </button>
                                        </div>
                                    )}
                                    
                                    {/* Seen Receipt */}
                                    {msg.from === mockDB.currentUser.username && idx === messages.length - 1 && msg.seen && !msg.unsent && (
                                        <span className="text-[10px] text-gray-500 absolute -bottom-4 right-1">Seen</span>
                                    )}
                                </div>
                            </div>
                        ))}
                        <div ref={messagesEndRef} />
                    </div>
                    
                    {/* Input Area */}
                    <div className="glass-dark p-4 flex items-center gap-3">
                        <input 
                            type="text"
                            value={input}
                            onChange={(e) => setInput(e.target.value)}
                            onKeyPress={(e) => e.key === 'Enter' && sendMessage()}
                            placeholder="Message..."
                            className="flex-1 bg-gray-800 rounded-full px-4 py-2 outline-none focus:ring-2 focus:ring-blue-500"
                        />
                        <button 
                            onClick={sendMessage}
                            disabled={!input.trim()}
                            className="w-10 h-10 rounded-full bg-blue-600 flex items-center justify-center disabled:opacity-50 disabled:cursor-not-allowed hover:bg-blue-700 transition"
                        >
                            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
                            </svg>
                        </button>
                    </div>
                </div>
            );
        };

        // Render App
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
